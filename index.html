<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PixiJS Match-3 Mobile Optimized</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            margin: 0; padding: 0; background-color: #000; 
            overflow: hidden; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            touch-action: none; position: fixed;
        }
        canvas { touch-action: none; display: block; }
    </style>
</head>
<body>
    <script src="https://pixijs.download/release/pixi.min.js"></script>
    <script>
        // --- 逻辑常数 ---
        const COLS = 14, ROWS = 14, BLOCK_SIZE = 48, GAP = 2;
        const DESIGN_W = 750, DESIGN_H = 1334; // 经典 16:9 设计稿

        let app, container, blocks = [], particles = [];
        let isAnimating = false, checkGravityMatches = false;
        let score = 0, highScore = localStorage.getItem('m3_hi_v2') || 0;
        let scoreText, hiScoreText, uiLayer;
        let selectedBlock = null, dragStartBlock = null;

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function init() {
            app = new PIXI.Application();
            // 使用 autoResize 适配手机
            await app.init({ 
                width: DESIGN_W, 
                height: DESIGN_H, 
                backgroundColor: 0x000000, 
                antialias: true,
                resolution: window.devicePixelRatio || 1,
                autoDensity: true
            });
            document.body.appendChild(app.canvas);
            
            // 响应式缩放 Canvas
            const resize = () => {
                const vpw = window.innerWidth;
                const vph = window.innerHeight;
                const scale = Math.min(vpw / DESIGN_W, vph / DESIGN_H);
                app.canvas.style.width = `${DESIGN_W * scale}px`;
                app.canvas.style.height = `${DESIGN_H * scale}px`;
            };
            window.addEventListener('resize', resize);
            resize();

            // 交互层
            app.stage.interactive = true;
            app.stage.on('pointerup', () => dragStartBlock = null);

            container = new PIXI.Container();
            app.stage.addChild(container);

            uiLayer = new PIXI.Container();
            app.stage.addChild(uiLayer);

            setupUI();
            resetGrid();
            app.ticker.add(update);
        }

        // --- 动态计算布局 ---
        const GRID_W = COLS * (BLOCK_SIZE + GAP);
        const GRID_X = (DESIGN_W - GRID_W) / 2;
        // 动态偏移：把棋盘放在屏幕中下部，给顶部留出约 25% 的空间放分数
        const GRID_Y = DESIGN_H * 0.22; 

        function setupUI() {
            const drawBox = (x, y, label) => {
                const g = new PIXI.Graphics().roundRect(0, 0, 240, 90, 15).fill(0x1a1a1a).stroke({ color: 0x444444, width: 2 });
                const c = new PIXI.Container(); c.addChild(g);
                const l = new PIXI.Text({ text: label, style: { fill: '#999', fontSize: 20 } });
                l.position.set(15, 8); c.addChild(l);
                c.x = x; c.y = y; uiLayer.addChild(c); return c;
            };

            const sBox = drawBox(50, 60, "SCORE");
            scoreText = new PIXI.Text({ text: "0", style: { fill: '#fff', fontSize: 34, fontWeight: 'bold' } });
            scoreText.position.set(15, 38); sBox.addChild(scoreText);

            const hBox = drawBox(DESIGN_W - 290, 60, "HIGH SCORE");
            hiScoreText = new PIXI.Text({ text: highScore, style: { fill: '#fff', fontSize: 34, fontWeight: 'bold' } });
            hiScoreText.position.set(15, 38); hBox.addChild(hiScoreText);

            // 重置按钮放在屏幕底部中心位置
            const btn = new PIXI.Container();
            btn.addChild(new PIXI.Graphics().circle(0,0,50).fill(0x333).stroke({color:0xffffff, width:3}));
            const icon = new PIXI.Graphics().arc(0,0,25,0,Math.PI*1.5).stroke({color:0xffffff, width:5});
            btn.addChild(icon); 
            btn.x = DESIGN_W / 2; btn.y = DESIGN_H - 120;
            btn.interactive = true; 
            btn.on('pointerdown', () => !isAnimating && resetGrid());
            uiLayer.addChild(btn);
        }

        // --- 色块逻辑 (继承之前的物理修复) ---
        class Block extends PIXI.Container {
            constructor(x, y, colorIdx) {
                super();
                this.gridX = x; this.gridY = y; this.colorIndex = colorIdx;
                this.isSpecial = false;
                this.animType = null;
                this.targetX = 0; this.targetY = 0;
                this.state = { v: 0, bounce: 0, delay: 0 };
                this.draw();
                this.interactive = true;
                this.on('pointerdown', onPointerDown).on('pointerover', onPointerOver);
            }
            draw() {
                this.removeChildren();
                const g = new PIXI.Graphics();
                if (this.isSpecial) {
                    for(let i=8; i>0; i--) g.circle(BLOCK_SIZE/2, BLOCK_SIZE/2, (BLOCK_SIZE/2)*(i/8)).fill({color: COLORS[i%5], alpha:0.8});
                } else {
                    g.roundRect(0, 0, BLOCK_SIZE, BLOCK_SIZE, 8).fill(COLORS[this.colorIndex])
                     .rect(4, 4, BLOCK_SIZE-8, 12).fill({color:0xffffff, alpha:0.2});
                }
                this.addChild(g);
            }
            slideTo(gx, gy) {
                this.gridX = gx; this.gridY = gy;
                this.targetX = GRID_X + gx * (BLOCK_SIZE + GAP);
                this.targetY = GRID_Y + gy * (BLOCK_SIZE + GAP);
                this.animType = 'slide';
            }
            dropTo(gx, gy, delay) {
                this.gridX = gx; this.gridY = gy;
                this.targetX = GRID_X + gx * (BLOCK_SIZE + GAP);
                this.targetY = GRID_Y + gy * (BLOCK_SIZE + GAP);
                this.state.delay = delay; this.state.v = 0; this.state.bounce = 0;
                this.animType = 'drop';
            }
        }

        function update(ticker) {
            const dt = ticker.deltaTime;
            let activeAnims = 0;

            blocks.forEach(col => col.forEach(b => {
                if (!b || !b.animType) return;
                activeAnims++;
                if (b.animType === 'slide') {
                    b.x += (b.targetX - b.x) * 0.3 * dt;
                    b.y += (b.targetY - b.y) * 0.3 * dt;
                    if (Math.abs(b.x - b.targetX) < 0.5) { b.x = b.targetX; b.y = b.targetY; b.animType = null; }
                } else if (b.animType === 'drop') {
                    if (b.state.delay > 0) { b.state.delay -= ticker.deltaMS; return; }
                    b.x = b.targetX;
                    if (b.state.bounce === 0) {
                        b.state.v += 1.6 * dt; b.y += b.state.v * dt;
                        if (b.y >= b.targetY) { b.y = b.targetY; b.state.v = -4.5; b.state.bounce = 1; }
                    } else if (b.state.bounce === 1) {
                        b.y += b.state.v * dt;
                        if (b.y <= b.targetY - 8) { b.state.v = 4.5; b.state.bounce = 2; }
                    } else {
                        b.y += b.state.v * dt;
                        if (b.y >= b.targetY) { b.y = b.targetY; b.animType = null; }
                    }
                }
            }));

            particles.forEach((p, i) => {
                p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.4 * dt; p.alpha -= 0.04 * dt;
                if(p.alpha <= 0) { app.stage.removeChild(p); particles.splice(i, 1); }
            });

            if (activeAnims === 0 && checkGravityMatches) {
                checkGravityMatches = false;
                let matchData = findMatches();
                if (matchData.matched.size > 0) processMatchesData(matchData);
                else isAnimating = false;
            }
        }

        // --- 核心逻辑 (保持之前的高稳定性版本) ---
        function onPointerDown(e) {
            if (isAnimating) return;
            dragStartBlock = this;
            if (selectedBlock) {
                if (isAdjacent(this, selectedBlock)) {
                    let b = selectedBlock; deselect(); performSwap(b, this);
                } else { deselect(); select(this); }
            } else select(this);
        }

        function onPointerOver(e) {
            if (isAnimating || !dragStartBlock || dragStartBlock === this) return;
            if (isAdjacent(dragStartBlock, this)) {
                let b = dragStartBlock; dragStartBlock = null; deselect(); performSwap(b, this);
            }
        }

        function isAdjacent(b1, b2) { return Math.abs(b1.gridX - b2.gridX) + Math.abs(b1.gridY - b2.gridY) === 1; }
        function select(b) { selectedBlock = b; const s = new PIXI.Graphics().rect(-2,-2,BLOCK_SIZE+4,BLOCK_SIZE+4).stroke({color:0xFFD700, width:3}); s.name="sel"; b.addChild(s); }
        function deselect() { if(selectedBlock) { const s=selectedBlock.getChildByName("sel"); if(s) selectedBlock.removeChild(s); selectedBlock=null; } }

        async function performSwap(b1, b2, isRevert = false) {
            isAnimating = true;
            const x1=b1.gridX, y1=b1.gridY, x2=b2.gridX, y2=b2.gridY;
            blocks[x1][y1]=b2; blocks[x2][y2]=b1;
            b1.slideTo(x2, y2); b2.slideTo(x1, y1);
            await wait(200);
            if (!isRevert) {
                let m = findMatches();
                if (m.matched.size > 0) processMatchesData(m);
                else performSwap(b1, b2, true);
            } else isAnimating = false;
        }

        function findMatches() {
            let matched = new Set(), specials = [];
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS - 2; x++) {
                    let b = blocks[x][y]; if (!b || b.isSpecial) continue;
                    let len = 1;
                    for (let i = x + 1; i < COLS; i++) { if (blocks[i][y] && !blocks[i][y].isSpecial && blocks[i][y].colorIndex === b.colorIndex) len++; else break; }
                    if (len >= 3) { for (let i = 0; i < len; i++) matched.add(blocks[x + i][y]); if (len >= 5) specials.push({x: x + 2, y: y}); x += len - 1; }
                }
            }
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS - 2; y++) {
                    let b = blocks[x][y]; if (!b || b.isSpecial) continue;
                    let len = 1;
                    for (let i = y + 1; i < ROWS; i++) { if (blocks[x][i] && !blocks[x][i].isSpecial && blocks[x][i].colorIndex === b.colorIndex) len++; else break; }
                    if (len >= 3) { for (let i = 0; i < len; i++) matched.add(blocks[x][y + i]); if (len >= 5) specials.push({x: x, y: y + 2}); y += len - 1; }
                }
            }
            return { matched, specials };
        }

        async function processMatchesData(data) {
            isAnimating = true; score += data.matched.size; 
            scoreText.text = score;
            if(score > highScore) { highScore = score; hiScoreText.text = highScore; localStorage.setItem('m3_hi_v2', highScore); }

            data.matched.forEach(b => {
                explode(b.x + BLOCK_SIZE/2, b.y + BLOCK_SIZE/2, COLORS[b.colorIndex]);
                container.removeChild(b); blocks[b.gridX][b.gridY] = null;
            });

            data.specials.forEach(pos => {
                let sb = spawnBlock(pos.x, pos.y); sb.isSpecial = true; sb.draw();
                sb.x = GRID_X + pos.x * (BLOCK_SIZE + GAP); sb.y = GRID_Y + pos.y * (BLOCK_SIZE + GAP);
                sb.on('pointerdown', () => triggerSpecial(sb));
            });
            await wait(250); applyGravity();
        }

        function applyGravity() {
            isAnimating = true;
            for (let x = 0; x < COLS; x++) {
                let holes = 0;
                for (let y = ROWS - 1; y >= 0; y--) {
                    if (blocks[x][y] === null) holes++;
                    else if (holes > 0) {
                        let b = blocks[x][y]; blocks[x][y + holes] = b; blocks[x][y] = null;
                        b.dropTo(x, y + holes, (ROWS - y) * 25);
                    }
                }
                for (let i = 0; i < holes; i++) {
                    let nb = spawnBlock(x, holes - 1 - i);
                    nb.y = GRID_Y - 200 - i * 50; 
                    nb.dropTo(x, holes - 1 - i, (ROWS + i) * 25);
                }
            }
            checkGravityMatches = true;
        }

        function spawnBlock(x, y) {
            let color = Math.floor(Math.random() * COLORS.length);
            const b = new Block(x, y, color);
            container.addChild(b); blocks[x][y] = b; return b;
        }

        function resetGrid() {
            isAnimating = true; checkGravityMatches = true; score = 0; scoreText.text = "0";
            container.removeChildren(); blocks = Array.from({ length: COLS }, () => Array(ROWS).fill(null));
            applyGravity();
        }

        async function triggerSpecial(b) {
            if(isAnimating) return; isAnimating = true;
            explode(b.x + BLOCK_SIZE/2, b.y + BLOCK_SIZE/2, 0, true);
            let k = 0;
            for(let x=Math.max(0, b.gridX-4); x<=Math.min(COLS-1, b.gridX+4); x++) {
                for(let y=Math.max(0, b.gridY-4); y<=Math.min(ROWS-1, b.gridY+4); y++) {
                    if(blocks[x][y]) { container.removeChild(blocks[x][y]); blocks[x][y]=null; k++; }
                }
            }
            score += k; scoreText.text = score;
            await wait(300); applyGravity();
        }

        function explode(x, y, color, isBig = false) {
            const f = new PIXI.Graphics().circle(0,0, isBig?130:40).fill({color:0xffffff, alpha:0.6});
            f.position.set(x,y); f.blendMode = 'add'; app.stage.addChild(f);
            setTimeout(() => app.stage.removeChild(f), 100);
            for(let i=0; i<(isBig?50:12); i++) {
                const p = new PIXI.Graphics().circle(0,0, Math.random()*5+2).fill(isBig?COLORS[i%5]:color);
                p.x = x; p.y = y; const a = Math.random()*Math.PI*2, s = Math.random()*10+2;
                p.vx = Math.cos(a)*s; p.vy = Math.sin(a)*s; p.alpha = 1.5;
                app.stage.addChild(p); particles.push(p);
            }
        }

        init();
    </script>
</body>
</html>
