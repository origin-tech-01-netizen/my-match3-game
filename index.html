<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PixiJS Match-3 Pro Fixed</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; touch-action: none; }
        canvas { touch-action: none; }
    </style>
</head>
<body>
    <script src="https://pixijs.download/release/pixi.min.js"></script>
    <script>
        // --- 基础配置 ---
        const COLS = 14, ROWS = 14, BLOCK_SIZE = 48, GAP = 2; // 14*50 = 700宽度，完美放入720
        const WIDTH = 720, HEIGHT = 1280;
        const COLORS = [0xFF3B30, 0xFFCC00, 0x4CD964, 0x007AFF, 0x5856D6];
        const GRID_W = COLS * (BLOCK_SIZE + GAP);
        const GRID_OFFSET_X = (WIDTH - GRID_W) / 2;
        const GRID_OFFSET_Y = 280; 

        let app, container, blocks = [], particles = [];
        let isAnimating = false, checkGravityMatches = false;
        let score = 0, highScore = localStorage.getItem('m3_hi') || 0;
        let scoreText, hiScoreText;
        let selectedBlock = null, dragStartBlock = null;

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function init() {
            app = new PIXI.Application();
            await app.init({ width: WIDTH, height: HEIGHT, backgroundColor: 0x000000, antialias: true });
            document.body.appendChild(app.canvas);
            
            app.stage.interactive = true;
            app.stage.on('pointerup', () => dragStartBlock = null);
            app.stage.on('pointerupoutside', () => dragStartBlock = null);

            container = new PIXI.Container();
            app.stage.addChild(container);

            setupUI();
            resetGrid();
            app.ticker.add(update);
        }

        // --- UI 设置 ---
        function setupUI() {
            const drawBox = (x, y, label) => {
                const g = new PIXI.Graphics().roundRect(0, 0, 220, 80, 15).fill(0x1a1a1a).stroke({ color: 0x333333, width: 2 });
                const c = new PIXI.Container(); c.addChild(g);
                const l = new PIXI.Text({ text: label, style: { fill: '#888', fontSize: 18 } });
                l.position.set(15, 8); c.addChild(l);
                c.x = x; c.y = y; app.stage.addChild(c); return c;
            };
            const sBox = drawBox(80, 60, "SCORE");
            scoreText = new PIXI.Text({ text: "0", style: { fill: '#fff', fontSize: 30, fontWeight: 'bold' } });
            scoreText.position.set(15, 35); sBox.addChild(scoreText);

            const hBox = drawBox(WIDTH - 300, 60, "HIGH SCORE");
            hiScoreText = new PIXI.Text({ text: highScore, style: { fill: '#fff', fontSize: 30, fontWeight: 'bold' } });
            hiScoreText.position.set(15, 35); hBox.addChild(hiScoreText);

            const btn = new PIXI.Container();
            btn.addChild(new PIXI.Graphics().circle(0,0,45).fill(0x222).stroke({color:0xffffff, width:2}));
            const icon = new PIXI.Graphics().arc(0,0,22,0,Math.PI*1.5).stroke({color:0xffffff, width:4});
            btn.addChild(icon); btn.x = WIDTH - 80; btn.y = HEIGHT - 80;
            btn.interactive = true; btn.on('pointerdown', () => !isAnimating && resetGrid());
            app.stage.addChild(btn);
        }

        function updateScore() {
            scoreText.text = score;
            if(score > highScore) { 
                highScore = score; hiScoreText.text = highScore; 
                localStorage.setItem('m3_hi', highScore); 
            }
        }

        // --- 核心类：色块 ---
        class Block extends PIXI.Container {
            constructor(x, y, colorIdx) {
                super();
                this.gridX = x; this.gridY = y; this.colorIndex = colorIdx;
                this.isSpecial = false;
                this.animType = null; // 'slide' or 'drop'
                this.targetX = 0; this.targetY = 0;
                this.state = { v: 0, bounce: 0, delay: 0 };
                this.draw();
                
                this.interactive = true;
                this.on('pointerdown', onPointerDown);
                this.on('pointerover', onPointerOver);
            }

            draw() {
                this.removeChildren();
                const g = new PIXI.Graphics();
                if (this.isSpecial) {
                    for(let i=10; i>0; i--) g.circle(BLOCK_SIZE/2, BLOCK_SIZE/2, (BLOCK_SIZE/2)*(i/10)).fill({color: COLORS[i%5], alpha:0.8});
                } else {
                    g.roundRect(0, 0, BLOCK_SIZE, BLOCK_SIZE, 8).fill(COLORS[this.colorIndex])
                     .rect(4, 4, BLOCK_SIZE-8, 12).fill({color:0xffffff, alpha:0.25});
                }
                this.addChild(g);
            }

            // 平滑滑动（用于拖拽交换）
            slideTo(gx, gy) {
                this.gridX = gx; this.gridY = gy;
                this.targetX = GRID_OFFSET_X + gx * (BLOCK_SIZE + GAP);
                this.targetY = GRID_OFFSET_Y + gy * (BLOCK_SIZE + GAP);
                this.animType = 'slide';
            }

            // 带回弹的下落（用于补空）
            dropTo(gx, gy, delay) {
                this.gridX = gx; this.gridY = gy;
                this.targetX = GRID_OFFSET_X + gx * (BLOCK_SIZE + GAP);
                this.targetY = GRID_OFFSET_Y + gy * (BLOCK_SIZE + GAP);
                this.state.delay = delay;
                this.state.v = 0; this.state.bounce = 0;
                this.animType = 'drop';
            }
        }

        // --- 动画循环 ---
        function update(ticker) {
            const dt = ticker.deltaTime;
            let activeAnims = 0;

            blocks.forEach(col => col.forEach(b => {
                if (!b || !b.animType) return;
                activeAnims++;
                
                if (b.animType === 'slide') {
                    b.x += (b.targetX - b.x) * 0.25 * dt;
                    b.y += (b.targetY - b.y) * 0.25 * dt;
                    if (Math.abs(b.x - b.targetX) < 1 && Math.abs(b.y - b.targetY) < 1) {
                        b.x = b.targetX; b.y = b.targetY;
                        b.animType = null;
                    }
                } else if (b.animType === 'drop') {
                    if (b.state.delay > 0) { b.state.delay -= ticker.deltaMS; return; }
                    b.x = b.targetX; // 强制对齐X轴
                    if (b.state.bounce === 0) {
                        b.state.v += 1.5 * dt; b.y += b.state.v * dt;
                        if (b.y >= b.targetY) { b.y = b.targetY; b.state.v = -4; b.state.bounce = 1; } // 反弹
                    } else if (b.state.bounce === 1) {
                        b.y += b.state.v * dt;
                        if (b.y <= b.targetY - 8) { b.state.v = 4; b.state.bounce = 2; } // 回落
                    } else {
                        b.y += b.state.v * dt;
                        if (b.y >= b.targetY) { b.y = b.targetY; b.animType = null; }
                    }
                }
            }));

            // 粒子更新
            particles.forEach((p, i) => {
                p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.4 * dt; p.alpha -= 0.04 * dt;
                if(p.alpha <= 0) { app.stage.removeChild(p); particles.splice(i, 1); }
            });

            // 当重力下落所有动画停止时，检测是否有新的消除
            if (activeAnims === 0 && checkGravityMatches) {
                checkGravityMatches = false;
                let matchData = findMatches();
                if (matchData.matched.size > 0) {
                    processMatchesData(matchData);
                } else {
                    isAnimating = false; // 完全静止，允许玩家操作
                }
            }
        }

        // --- 交互逻辑 ---
        function onPointerDown(e) {
            if (isAnimating || this.isSpecial) return;
            dragStartBlock = this;
            
            if (selectedBlock) {
                if (isAdjacent(this, selectedBlock)) {
                    let temp = selectedBlock;
                    deselect();
                    performSwap(temp, this);
                    dragStartBlock = null;
                } else {
                    deselect(); select(this);
                }
            } else {
                select(this);
            }
        }

        function onPointerOver(e) {
            if (isAnimating || this.isSpecial || !dragStartBlock || dragStartBlock === this) return;
            if (isAdjacent(dragStartBlock, this)) {
                let temp = dragStartBlock;
                dragStartBlock = null; // 防抖，防止连续触发
                deselect();
                performSwap(temp, this);
            }
        }

        function isAdjacent(b1, b2) {
            return Math.abs(b1.gridX - b2.gridX) + Math.abs(b1.gridY - b2.gridY) === 1;
        }

        function select(b) {
            selectedBlock = b;
            const s = new PIXI.Graphics().rect(-2,-2,BLOCK_SIZE+4,BLOCK_SIZE+4).stroke({color:0xFFD700, width:3});
            s.name="sel"; b.addChild(s);
        }

        function deselect() {
            if(selectedBlock) { const s=selectedBlock.getChildByName("sel"); if(s) selectedBlock.removeChild(s); selectedBlock=null; }
        }

        async function performSwap(b1, b2, isRevert = false) {
            isAnimating = true;
            // 数组坐标交换
            const x1=b1.gridX, y1=b1.gridY, x2=b2.gridX, y2=b2.gridY;
            blocks[x1][y1]=b2; blocks[x2][y2]=b1;
            
            // 视觉平滑滑动（非重力）
            b1.slideTo(x2, y2); b2.slideTo(x1, y1);
            
            await wait(250); // 等待滑动完成

            if (!isRevert) {
                let matchData = findMatches();
                if (matchData.matched.size > 0) {
                    processMatchesData(matchData);
                } else {
                    // 没有匹配，退回原位
                    performSwap(b1, b2, true);
                }
            } else {
                isAnimating = false;
            }
        }

        // --- 扫描与消除逻辑 ---
        function findMatches() {
            let matched = new Set();
            let specials = [];

            // 横向扫描
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS - 2; x++) {
                    let b = blocks[x][y];
                    if (!b || b.isSpecial) continue;
                    let len = 1;
                    for (let i = x + 1; i < COLS; i++) {
                        if (blocks[i][y] && !blocks[i][y].isSpecial && blocks[i][y].colorIndex === b.colorIndex) len++;
                        else break;
                    }
                    if (len >= 3) {
                        for (let i = 0; i < len; i++) matched.add(blocks[x + i][y]);
                        if (len >= 5) specials.push({x: x + Math.floor(len/2), y: y});
                        x += len - 1; 
                    }
                }
            }
            // 纵向扫描
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS - 2; y++) {
                    let b = blocks[x][y];
                    if (!b || b.isSpecial) continue;
                    let len = 1;
                    for (let i = y + 1; i < ROWS; i++) {
                        if (blocks[x][i] && !blocks[x][i].isSpecial && blocks[x][i].colorIndex === b.colorIndex) len++;
                        else break;
                    }
                    if (len >= 3) {
                        for (let i = 0; i < len; i++) matched.add(blocks[x][y + i]);
                        if (len >= 5) {
                            // 避免行列交叉产生两个特殊的点
                            if(!specials.some(s => s.x === x && s.y === y + Math.floor(len/2))) {
                                specials.push({x: x, y: y + Math.floor(len/2)});
                            }
                        }
                        y += len - 1;
                    }
                }
            }
            return { matched, specials };
        }

        async function processMatchesData(data) {
            isAnimating = true;
            score += data.matched.size; updateScore();

            data.matched.forEach(b => {
                explode(b.x + BLOCK_SIZE/2, b.y + BLOCK_SIZE/2, COLORS[b.colorIndex]);
                container.removeChild(b);
                blocks[b.gridX][b.gridY] = null; // 核心：彻底清空数据，杜绝幽灵块
            });

            data.specials.forEach(pos => {
                let sb = spawnBlock(pos.x, pos.y);
                sb.isSpecial = true; sb.draw();
                sb.x = GRID_OFFSET_X + pos.x * (BLOCK_SIZE + GAP);
                sb.y = GRID_OFFSET_Y + pos.y * (BLOCK_SIZE + GAP);
                sb.animType = null; 
                sb.on('pointerdown', () => triggerSpecial(sb));
            });

            await wait(300); // 给一点爆炸表现时间
            applyGravity();
        }

        // --- 物理与重力 ---
        function applyGravity() {
            isAnimating = true;
            for (let x = 0; x < COLS; x++) {
                let holes = 0;
                // 1. 已有块往下填
                for (let y = ROWS - 1; y >= 0; y--) {
                    if (blocks[x][y] === null) {
                        holes++;
                    } else if (holes > 0) {
                        let b = blocks[x][y];
                        blocks[x][y + holes] = b;
                        blocks[x][y] = null;
                        b.dropTo(x, y + holes, (ROWS - y) * 30); // 越靠下的块延迟越低，先动
                    }
                }
                // 2. 屏幕外生成新块补齐
                for (let i = 0; i < holes; i++) {
                    let nb = spawnBlock(x, holes - 1 - i);
                    nb.y = GRID_OFFSET_Y - 150 - i * BLOCK_SIZE; // 藏在屏幕上方
                    nb.dropTo(x, holes - 1 - i, (ROWS + i) * 30);
                }
            }
            checkGravityMatches = true; // 告诉循环，下落完检查连消
        }

        function spawnBlock(x, y) {
            let color;
            const forbidden = [];
            if (x > 1 && blocks[x-1][y] && blocks[x-2][y]) forbidden.push(blocks[x-1][y].colorIndex);
            if (y < ROWS - 2 && blocks[x][y+1] && blocks[x][y+2]) forbidden.push(blocks[x][y+1].colorIndex);
            
            do { color = Math.floor(Math.random()*COLORS.length); } 
            while (Math.random() < 0.8 && forbidden.includes(color));

            const b = new Block(x, y, color);
            container.addChild(b);
            blocks[x][y] = b;
            return b;
        }

        function resetGrid() {
            isAnimating = true; checkGravityMatches = true;
            score = 0; updateScore();
            container.removeChildren();
            blocks = Array.from({ length: COLS }, () => Array(ROWS).fill(null));
            applyGravity(); // 借用补空逻辑进行完美下落生成
        }

        // --- 特效与特殊块 ---
        async function triggerSpecial(b) {
            if(isAnimating) return;
            isAnimating = true;
            explode(b.x + BLOCK_SIZE/2, b.y + BLOCK_SIZE/2, 0, true);
            
            let killed = 0;
            for(let x=Math.max(0, b.gridX-4); x<=Math.min(COLS-1, b.gridX+4); x++) {
                for(let y=Math.max(0, b.gridY-4); y<=Math.min(ROWS-1, b.gridY+4); y++) {
                    if(blocks[x][y]) { 
                        container.removeChild(blocks[x][y]); 
                        blocks[x][y]=null; 
                        killed++; 
                    }
                }
            }
            score += killed; updateScore();
            await wait(350);
            applyGravity();
        }

        function explode(x, y, color, isBig = false) {
            const flash = new PIXI.Graphics().circle(0,0, isBig ? 120 : 35).fill({color:0xffffff, alpha:0.7});
            flash.position.set(x,y); flash.blendMode = 'add'; app.stage.addChild(flash);
            setTimeout(() => app.stage.removeChild(flash), 100);

            const pCount = isBig ? 60 : 12;
            for(let i=0; i<pCount; i++) {
                const p = new PIXI.Graphics().circle(0,0, Math.random()*6+2).fill(isBig ? COLORS[Math.floor(Math.random()*5)] : color);
                p.x = x; p.y = y;
                const angle = Math.random()*Math.PI*2;
                const spd = Math.random()*(isBig?16:8) + 2;
                p.vx = Math.cos(angle)*spd; p.vy = Math.sin(angle)*spd; p.alpha = 1.5;
                app.stage.addChild(p); particles.push(p);
            }
        }

        init();
    </script>
</body>
</html>
