<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PixiJS Match-3 Final Fixed</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; background-color: #000; 
            overflow: hidden; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            touch-action: none; position: fixed;
        }
        canvas { touch-action: none; display: block; }
    </style>
</head>
<body>
    <script src="https://pixijs.download/release/pixi.min.js"></script>
    <script>
        // --- 核心配置 ---
        const COLS = 14, ROWS = 14, BLOCK_SIZE = 46, GAP = 2;
        const DESIGN_W = 750, DESIGN_H = 1334;
        const COLORS = [0xFF3B30, 0xFFCC00, 0x4CD964, 0x007AFF, 0x5856D6];
        
        const GRID_W = COLS * (BLOCK_SIZE + GAP);
        const GRID_X = (DESIGN_W - GRID_W) / 2;
        const GRID_Y = DESIGN_H * 0.25; 

        let app, container, uiLayer, blocks = [], particles = [];
        let isAnimating = false, checkAfterAnimation = false;
        let score = 0, highScore = localStorage.getItem('m3_hi_v3') || 0;
        let scoreText, hiScoreText, selectedBlock = null, dragStartBlock = null;

        const wait = (ms) => new Promise(r => setTimeout(r, ms));

        async function init() {
            app = new PIXI.Application();
            await app.init({ 
                width: DESIGN_W, height: DESIGN_H, 
                backgroundColor: 0x000000, antialias: true,
                resolution: window.devicePixelRatio || 1, autoDensity: true
            });
            document.body.appendChild(app.canvas);

            // 屏幕自适应
            const resize = () => {
                const scale = Math.min(window.innerWidth / DESIGN_W, window.innerHeight / DESIGN_H);
                app.canvas.style.width = `${DESIGN_W * scale}px`;
                app.canvas.style.height = `${DESIGN_H * scale}px`;
            };
            window.addEventListener('resize', resize); resize();

            container = new PIXI.Container();
            uiLayer = new PIXI.Container();
            app.stage.addChild(container, uiLayer);

            setupUI();
            resetGrid();
            app.ticker.add(update);

            app.stage.interactive = true;
            app.stage.on('pointerup', () => dragStartBlock = null);
        }

        // --- UI 系统 ---
        function setupUI() {
            const style = { fill: '#ffffff', fontSize: 32, fontWeight: 'bold' };
            const drawBox = (x, y, label) => {
                const g = new PIXI.Graphics().roundRect(0, 0, 260, 100, 15).fill(0x1a1a1a).stroke({ color: 0x333333, width: 2 });
                const c = new PIXI.Container(); c.addChild(g);
                const l = new PIXI.Text({ text: label, style: { fill: '#888', fontSize: 18 } });
                l.position.set(15, 10); c.addChild(l);
                c.x = x; c.y = y; uiLayer.addChild(c); return c;
            };

            const sBox = drawBox(40, 60, "SCORE");
            scoreText = new PIXI.Text({ text: "0", style });
            scoreText.position.set(15, 42); sBox.addChild(scoreText);

            const hBox = drawBox(DESIGN_W - 300, 60, "HIGH SCORE");
            hiScoreText = new PIXI.Text({ text: highScore, style });
            hiScoreText.position.set(15, 42); hBox.addChild(hiScoreText);

            const btn = new PIXI.Container();
            btn.addChild(new PIXI.Graphics().circle(0,0,50).fill(0x222).stroke({color:0xffffff, width:3}));
            btn.addChild(new PIXI.Graphics().arc(0,0,25,0,Math.PI*1.5).stroke({color:0xffffff, width:5}));
            btn.x = DESIGN_W / 2; btn.y = DESIGN_H - 120;
            btn.interactive = true; btn.on('pointerdown', () => !isAnimating && resetGrid());
            uiLayer.addChild(btn);
        }

        // --- 色块类 ---
        class Block extends PIXI.Container {
            constructor(x, y, colorIdx) {
                super();
                this.gridX = x; this.gridY = y; this.colorIndex = colorIdx;
                this.isSpecial = false;
                this.animType = null;
                this.targetX = 0; this.targetY = 0;
                this.state = { v: 0, bounce: 0, delay: 0 };
                
                // 初始位置初始化
                this.x = GRID_X + x * (BLOCK_SIZE + GAP);
                this.y = -100; 

                this.draw();
                this.interactive = true;
                this.on('pointerdown', onPointerDown).on('pointerover', onPointerOver);
            }
            draw() {
                this.removeChildren();
                const g = new PIXI.Graphics();
                if (this.isSpecial) {
                    for(let i=10; i>0; i--) g.circle(BLOCK_SIZE/2, BLOCK_SIZE/2, (BLOCK_SIZE/2)*(i/10)).fill({color: COLORS[i%5], alpha:0.8});
                } else {
                    g.roundRect(0, 0, BLOCK_SIZE, BLOCK_SIZE, 8).fill(COLORS[this.colorIndex])
                     .rect(4, 4, BLOCK_SIZE-8, 12).fill({color:0xffffff, alpha:0.25});
                }
                this.addChild(g);
            }
            dropTo(gx, gy, delay) {
                this.gridX = gx; this.gridY = gy;
                this.targetX = GRID_X + gx * (BLOCK_SIZE + GAP);
                this.targetY = GRID_Y + gy * (BLOCK_SIZE + GAP);
                this.state.delay = delay; this.state.v = 0; this.state.bounce = 0;
                this.animType = 'drop';
            }
            slideTo(gx, gy) {
                this.gridX = gx; this.gridY = gy;
                this.targetX = GRID_X + gx * (BLOCK_SIZE + GAP);
                this.targetY = GRID_Y + gy * (BLOCK_SIZE + GAP);
                this.animType = 'slide';
            }
        }

        // --- 核心循环 ---
        function update(ticker) {
            const dt = ticker.deltaTime;
            let moving = 0;

            blocks.forEach(col => col.forEach(b => {
                if (!b || !b.animType) return;
                moving++;
                if (b.animType === 'slide') {
                    b.x += (b.targetX - b.x) * 0.3 * dt;
                    b.y += (b.targetY - b.y) * 0.3 * dt;
                    if (Math.abs(b.x - b.targetX) < 0.5) { b.x = b.targetX; b.y = b.targetY; b.animType = null; }
                } else if (b.animType === 'drop') {
                    if (b.state.delay > 0) { b.state.delay -= ticker.deltaMS; return; }
                    b.x = b.targetX; 
                    if (b.state.bounce === 0) { // 下落
                        b.state.v += 1.5 * dt; b.y += b.state.v * dt;
                        if (b.y >= b.targetY) { b.y = b.targetY; b.state.v = -4; b.state.bounce = 1; }
                    } else if (b.state.bounce === 1) { // 弹起
                        b.y += b.state.v * dt;
                        if (b.y <= b.targetY - 8) { b.state.v = 4; b.state.bounce = 2; } // 8px回弹
                    } else { // 落下
                        b.y += b.state.v * dt;
                        if (b.y >= b.targetY) { b.y = b.targetY; b.animType = null; }
                    }
                }
            }));

            particles.forEach((p, i) => {
                p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 0.4 * dt; p.alpha -= 0.04 * dt;
                if(p.alpha <= 0) { app.stage.removeChild(p); particles.splice(i, 1); }
            });

            if (moving === 0 && checkAfterAnimation) {
                checkAfterAnimation = false;
                let m = findMatches();
                if (m.matched.size > 0) processMatches(m);
                else isAnimating = false;
            }
        }

        // --- 游戏逻辑 ---
        function resetGrid() {
            isAnimating = true; container.removeChildren();
            score = 0; scoreText.text = "0";
            blocks = Array.from({ length: COLS }, () => Array(ROWS).fill(null));
            applyGravity(true);
        }

        function applyGravity(isInitial = false) {
            isAnimating = true;
            for (let x = 0; x < COLS; x++) {
                let holes = 0;
                for (let y = ROWS - 1; y >= 0; y--) {
                    if (blocks[x][y] === null) holes++;
                    else if (holes > 0) {
                        let b = blocks[x][y]; blocks[x][y + holes] = b; blocks[x][y] = null;
                        // 最下面的最先动：延迟 = (总行数 - 当前行) * 间隔
                        b.dropTo(x, y + holes, (ROWS - y) * 35);
                    }
                }
                for (let i = 0; i < holes; i++) {
                    let nb = spawnBlock(x, holes - 1 - i);
                    nb.y = -100 - (i * 60); // 从屏幕外排队
                    nb.dropTo(x, holes - 1 - i, (ROWS + i) * 35);
                }
            }
            checkAfterAnimation = true;
        }

        function spawnBlock(x, y) {
            const color = Math.floor(Math.random() * COLORS.length);
            const b = new Block(x, y, color);
            container.addChild(b);
            blocks[x][y] = b;
            return b;
        }

        function findMatches() {
            let matched = new Set(), specials = [];
            const check = (list) => {
                if (list.length >= 3) {
                    list.forEach(b => matched.add(b));
                    if (list.length >= 5) specials.push(list[Math.floor(list.length/2)]);
                }
            };
            // 横向
            for (let y = 0; y < ROWS; y++) {
                let curr = [];
                for (let x = 0; x < COLS; x++) {
                    let b = blocks[x][y];
                    if (b && !b.isSpecial && (curr.length === 0 || b.colorIndex === curr[0].colorIndex)) curr.push(b);
                    else { check(curr); curr = b && !b.isSpecial ? [b] : []; }
                }
                check(curr);
            }
            // 纵向
            for (let x = 0; x < COLS; x++) {
                let curr = [];
                for (let y = 0; y < ROWS; y++) {
                    let b = blocks[x][y];
                    if (b && !b.isSpecial && (curr.length === 0 || b.colorIndex === curr[0].colorIndex)) curr.push(b);
                    else { check(curr); curr = b && !b.isSpecial ? [b] : []; }
                }
                check(curr);
            }
            return { matched, specials };
        }

        async function processMatches(data) {
            score += data.matched.size; scoreText.text = score;
            if(score > highScore) { highScore = score; hiScoreText.text = highScore; localStorage.setItem('m3_hi_v3', highScore); }

            data.matched.forEach(b => {
                explode(b.x + BLOCK_SIZE/2, b.y + BLOCK_SIZE/2, COLORS[b.colorIndex]);
                container.removeChild(b); blocks[b.gridX][b.gridY] = null;
            });

            data.specials.forEach(b => {
                let sb = spawnBlock(b.gridX, b.gridY); sb.isSpecial = true; sb.draw();
                sb.y = GRID_Y + b.gridY * (BLOCK_SIZE + GAP);
                sb.on('pointerdown', () => triggerSpecial(sb));
            });
            await wait(300); applyGravity();
        }

        // --- 交互 ---
        function onPointerDown(e) {
            if (isAnimating) return;
            dragStartBlock = this;
            if (selectedBlock) {
                if (Math.abs(this.gridX - selectedBlock.gridX) + Math.abs(this.gridY - selectedBlock.gridY) === 1) {
                    let b = selectedBlock; deselect(); swap(b, this);
                } else { deselect(); select(this); }
            } else select(this);
        }
        function onPointerOver() {
            if (isAnimating || !dragStartBlock || dragStartBlock === this) return;
            if (Math.abs(this.gridX - dragStartBlock.gridX) + Math.abs(this.gridY - dragStartBlock.gridY) === 1) {
                let b = dragStartBlock; dragStartBlock = null; deselect(); swap(b, this);
            }
        }
        function select(b) { selectedBlock = b; const s = new PIXI.Graphics().rect(-2,-2,BLOCK_SIZE+4,BLOCK_SIZE+4).stroke({color:0xFFD700, width:3}); s.name="sel"; b.addChild(s); }
        function deselect() { if(selectedBlock) { const s=selectedBlock.getChildByName("sel"); if(s) selectedBlock.removeChild(s); selectedBlock=null; } }

        async function swap(b1, b2, revert = false) {
            isAnimating = true;
            const x1=b1.gridX, y1=b1.gridY, x2=b2.gridX, y2=b2.gridY;
            blocks[x1][y1]=b2; blocks[x2][y2]=b1;
            b1.slideTo(x2, y2); b2.slideTo(x1, y1);
            await wait(250);
            if (!revert) {
                let m = findMatches();
                if (m.matched.size > 0) processMatches(m);
                else swap(b1, b2, true);
            } else isAnimating = false;
        }

        async function triggerSpecial(b) {
            if(isAnimating) return; isAnimating = true;
            explode(b.x + BLOCK_SIZE/2, b.y + BLOCK_SIZE/2, 0, true);
            let k = 0;
            for(let x=Math.max(0, b.gridX-4); x<=Math.min(COLS-1, b.gridX+4); x++) {
                for(let y=Math.max(0, b.gridY-4); y<=Math.min(ROWS-1, b.gridY+4); y++) {
                    if(blocks[x][y]) { container.removeChild(blocks[x][y]); blocks[x][y]=null; k++; }
                }
            }
            score += k; scoreText.text = score;
            await wait(300); applyGravity();
        }

        function explode(x, y, color, isBig = false) {
            // 圆形光晕增强
            const flash = new PIXI.Graphics().circle(0,0, isBig?150:40).fill({color:0xffffff, alpha:0.6});
            flash.position.set(x,y); flash.blendMode = 'add'; app.stage.addChild(flash);
            setTimeout(() => app.stage.removeChild(flash), 100);

            for(let i=0; i<(isBig?60:15); i++) {
                const p = new PIXI.Graphics().circle(0,0, Math.random()*5+2).fill(isBig?COLORS[i%5]:color);
                p.x = x; p.y = y; const a = Math.random()*Math.PI*2, s = Math.random()*10+2;
                p.vx = Math.cos(a)*s; p.vy = Math.sin(a)*s; p.alpha = 1.5;
                app.stage.addChild(p); particles.push(p);
            }
        }

        init();
    </script>
</body>
</html>
